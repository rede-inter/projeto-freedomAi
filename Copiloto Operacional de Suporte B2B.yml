        code: "function main({intent, customer_id, ticket_id}) {\n  var result = {\n\
          \    customer_valid: 'true', ticket_valid: 'true',\n    customer_errors:\
          \ '', ticket_errors: '', should_proceed: 'true'\n  };\n  var needs_customer\
          \ = ['GET_CUSTOMER','GET_SLA','CREATE_TICKET'].indexOf(intent) !== -1;\n\
          \  var needs_ticket   = ['GET_TICKET','ESCALATE_TICKET'].indexOf(intent)\
          \ !== -1;\n  var intent_messages = {\n    'GET_CUSTOMER':'consultar um cliente','GET_SLA':'ver\
          \ o SLA de um cliente',\n    'GET_TICKET':'visualizar um ticket','CREATE_TICKET':'criar\
          \ um novo ticket',\n    'ESCALATE_TICKET':'escalar um ticket','TRIAGE':'fazer\
          \ triagem de um problema'\n  };\n  if (needs_customer) {\n    var cust_id\
          \ = (customer_id || '').trim().toUpperCase();\n    if (!cust_id) {\n   \
          \   result.customer_valid = 'false';\n      result.customer_errors = 'ID\
          \ do cliente não informado. Para ' + (intent_messages[intent] || 'esta operação')\
          \ + ', informe o ID no formato CUST-XXX (ex: CUST-001).';\n      result.should_proceed\
          \ = 'false';\n    } else if (!/^CUST-[A-Z0-9]+$/i.test(cust_id)) {\n   \
          \   result.customer_valid = 'false';\n      result.customer_errors = 'Formato\
          \ de ID de cliente inválido: \"' + cust_id + '\". Formato esperado: CUST-XXX\
          \ (ex: CUST-001).';\n      result.should_proceed = 'false';\n    }\n  }\n\
          \  if (needs_ticket) {\n    var tkt_id = (ticket_id || '').trim().toUpperCase();\n\
          \    if (!tkt_id) {\n      result.ticket_valid = 'false';\n      result.ticket_errors\
          \ = 'ID do ticket não informado. Para ' + (intent_messages[intent] || 'esta\
          \ operação') + ', informe o ID no formato TKT-00000 (ex: TKT-00001).';\n\
          \      result.should_proceed = 'false';\n    } else if (!/^TKT-\\d{5}$/i.test(tkt_id))\
          \ {\n      result.ticket_valid = 'false';\n      result.ticket_errors =\
          \ 'Formato de ID de ticket inválido: \"' + tkt_id + '\". Formato esperado:\
          \ TKT-NNNNN com 5 dígitos (ex: TKT-00001).';\n      result.should_proceed\
          \ = 'false';\n    }\n  }\n  return result;\n}"
