    - data:
        code: "function main({body}) {\n  try {\n    var d = JSON.parse(body).data;\n\
          \    var lines = ['\\uD83D\\uDCCB *Resumo do Atendimento*', 'Conversa: '\
          \ + d.conversationId, 'In\\xEDcio: ' + d.startedAt, 'Total de eventos:\
          \ ' + d.totalEvents];\n    if (d.customersConsulted && d.customersConsulted.length)\
          \ lines.push('Clientes consultados: ' + d.customersConsulted.join(', '));\n\
          \    if (d.ticketsCreated && d.ticketsCreated.length) lines.push('Tickets\
          \ criados: ' + d.ticketsCreated.join(', '));\n    if (d.ticketsEscalated\
          \ && d.ticketsEscalated.length) lines.push('Tickets escalados: ' + d.ticketsEscalated.join(',\
          \ '));\n    if (d.triagePerformed) lines.push('Triagem: realizada');\n  \
          \  lines.push('', d.summary);\n    return { resposta: lines.join('\\n')\
          \ };\n  } catch(e) { return { resposta: 'Erro ao processar resumo.' }; }\n\
          }"
