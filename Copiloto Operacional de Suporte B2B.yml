          \ || '').replace(/```json\\n?/g, '').replace(/```\\n?/g, '').trim();\n \
          \   var p = JSON.parse(clean);\n    var e = p.entities || {};\n    var conf\
          \ = parseFloat(String(p.confidence || 0)) || 0;\n    var intent = String(p.intent\
          \ || 'UNKNOWN');\n    var valid = ['GET_CUSTOMER','GET_SLA','GET_TICKET','CREATE_TICKET','ESCALATE_TICKET','TRIAGE','DUVIDA_DOCS','RESUMO_ATENDIMENTO','UNKNOWN'];\n\
          \    if (conf < 0.75 || valid.indexOf(intent) === -1) { intent = 'UNKNOWN';\
          \ }\n    return {\n      intent: intent,\n      customer_id: String(e.customer_id\
          \ || '').trim().toUpperCase(),\n      ticket_id: String(e.ticket_id || '').trim().toUpperCase(),\n\
          \      title: String(e.title || ''),\n      description: String(e.description\
          \ || ''),\n      category: String(e.category || ''),\n      reporter_email:\
          \ String(e.reporter_email || ''),\n      justification: String(e.justification\
          \ || ''),\n      affected_users: String(e.affected_users || '1'),\n    \
          \  impact: String(e.impact || 'low'),\n      clarification_needed: String((p.clarification_needed\
          \ || []).join(', '))\n    };\n  } catch(err) {\n    return {intent:'UNKNOWN',customer_id:'',ticket_id:'',title:'',description:'',\n\
          \            category:'',reporter_email:'',justification:'',affected_users:'1',\n\
          \            impact:'low',clarification_needed:''};\n  }\n}"
