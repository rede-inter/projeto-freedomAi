app:
  description: Copiloto operacional de suporte B2B com classificação de intenção,
    guardrails, knowledge base real, mascaramento de dados sensíveis e tratamento
    de falhas de API.
  icon: 🤖
  icon_background: '#E0F2FE'
  mode: advanced-chat
  name: Copiloto Operacional de Suporte B2B
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/openai:0.3.2@d70fb969e7c79719bee96573a8f4c9dc4ffd984f4171b9184cc3869c886af45d
    version: null
kind: app
version: 0.5.0
workflow:
  conversation_variables: []
  environment_variables:
  - description: URL base do backend
    id: ev1
    name: BACKEND_URL
    selector:
    - env
    - BACKEND_URL
    value: ''
    value_type: secret
  - description: API Key do backend
    id: ev2
    name: BACKEND_API_KEY
    selector:
    - env
    - BACKEND_API_KEY
    value: ''
    value_type: secret
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: 'Olá! Sou o Copiloto de Suporte B2B. Posso ajudar com:

      - Consultar clientes e SLAs

      - Ver tickets de suporte

      - Criar novos tickets

      - Escalar atendimentos

      - Fazer triagem de problemas

      - Responder dúvidas sobre processos


      Como posso ajudar?

      '
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - Consultar cliente CUST-001
    - Ver SLA do cliente CUST-002
    - Mostrar ticket TKT-00001
    - Quero abrir um ticket de suporte
    - Escalar o ticket TKT-00001
    - Como funciona o processo de escalonamento?
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
