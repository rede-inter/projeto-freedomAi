version: "3.8"

services:
  api:
    image: langgenius/dify-api:0.15.3
    environment:
      MODE: api
      LOG_LEVEL: INFO
      SECRET_KEY: your-secret-key-here
      CONSOLE_WEB_URL: "https://dify.redeinter.online"
      CONSOLE_API_URL: "https://dify.redeinter.online"
      SERVICE_API_URL: "https://dify.redeinter.online"
      APP_WEB_URL: "https://dify.redeinter.online"
      CHECK_UPDATE_URL: https://updates.dify.ai
      OPENAI_API_BASE: https://api.openai.com/v1
      FILES_URL: "https://dify.redeinter.online"
      MIGRATION_ENABLED: "true"
      DEPLOY_ENV: PRODUCTION
      DB_USERNAME: postgres
      DB_PASSWORD: your-db-password
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: your-db-password
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:your-db-password@redis:6379/1
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: storage
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: your-weaviate-api-key
      CODE_EXECUTION_ENDPOINT: http://sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
      SSRF_PROXY_HTTPS_URL: http://ssrf_proxy:3128
    volumes:
      - dify_storage:/app/api/storage
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.http.routers.dify-api.rule=Host(`dify.redeinter.online`) && (PathPrefix(`/console/api`) || PathPrefix(`/api`) || PathPrefix(`/v1`) || PathPrefix(`/files`))
        - traefik.http.routers.dify-api.entrypoints=websecure
        - traefik.http.routers.dify-api.tls=true
        - traefik.http.routers.dify-api.tls.certresolver=letsencryptresolver
        - traefik.http.services.dify-api.loadbalancer.server.port=5001

  worker:
    image: langgenius/dify-api:0.15.3
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: your-secret-key-here
      DB_USERNAME: postgres
      DB_PASSWORD: your-db-password
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: your-db-password
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:your-db-password@redis:6379/1
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: storage
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: your-weaviate-api-key
      SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
      SSRF_PROXY_HTTPS_URL: http://ssrf_proxy:3128
    volumes:
      - dify_storage:/app/api/storage
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  web:
    image: langgenius/dify-web:0.15.3
    environment:
      CONSOLE_API_URL: "https://dify.redeinter.online"
      APP_API_URL: "https://dify.redeinter.online"
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.http.routers.dify-web.rule=Host(`dify.redeinter.online`)
        - traefik.http.routers.dify-web.entrypoints=websecure
        - traefik.http.routers.dify-web.tls=true
        - traefik.http.routers.dify-web.tls.certresolver=letsencryptresolver
        - traefik.http.services.dify-web.loadbalancer.server.port=3000

  db:
    image: postgres:15-alpine
    environment:
      PGUSER: postgres
      POSTGRES_PASSWORD: your-db-password
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dify_db:/var/lib/postgresql/data
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  redis:
    image: redis:6-alpine
    command: redis-server --requirepass your-db-password
    volumes:
      - dify_redis:/data
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  sandbox:
    image: langgenius/dify-sandbox:0.2.1
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://ssrf_proxy:3128
      HTTPS_PROXY: http://ssrf_proxy:3128
      SANDBOX_PORT: 8194
    volumes:
      - dify_sandbox:/dependencies
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  ssrf_proxy:
    image: ubuntu/squid:latest
    environment:
      HTTP_PORT: 3128
      COREDUMP_DIR: /var/spool/squid
      REVERSE_PROXY_PORT: 8194
      SANDBOX_HOST: sandbox
      SANDBOX_PORT: 8194
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  weaviate:
    image: semitechnologies/weaviate:1.19.0
    volumes:
      - dify_weaviate:/var/lib/weaviate
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: your-weaviate-api-key
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any

networks:
  public:
    external: true
    name: network_swarm_public

volumes:
  dify_storage:
  dify_db:
  dify_redis:
  dify_sandbox:
  dify_weaviate:
